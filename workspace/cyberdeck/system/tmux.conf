# ═══════════════════════════════════════════════════════════════
#  CYBERDECK tmux Configuration
#  赛博朋克主题状态栏 — NanoPi 2 便携电脑
# ═══════════════════════════════════════════════════════════════
#
# 配色方案:
#   背景:   #0a0a0f  深黑偏蓝
#   主色:   #00fff0  荧光青
#   强调:   #ff00ff  品红
#   次要:   #7b2ff7  电紫
#   文字:   #c0c0c0  银灰
#   警告:   #ff2d6f  霓虹红
#   成功:   #00ff64  荧光绿
#
# ═══════════════════════════════════════════════════════════════

# ── 基础 ──────────────────────────────────────────────────────
# 256色 + 真彩色支持
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── 状态栏 — 赛博朋克主题 ────────────────────────────────────

# 位置和刷新
set -g status-position bottom
set -g status-interval 1

# 状态栏底色
set -g status-style "bg=#0a0a0f,fg=#00fff0"

# ── 左侧状态栏 ──
# 显示: ⚡ 会话名 │
set -g status-left-length 40
set -g status-left "\
#[fg=#00fff0,bold] ⚡ #S \
#[fg=#7b2ff7]│#[default] "

# ── 右侧状态栏 ──
# 显示: 用户@主机 │ CPU负载 │ 内存 │ 时间
set -g status-right-length 80
set -g status-right "\
#[fg=#ff00ff]#(whoami)@#H \
#[fg=#7b2ff7]│ \
#[fg=#00ff64]#(cut -d' ' -f1-3 /proc/loadavg) \
#[fg=#7b2ff7]│ \
#[fg=#00fff0]#(free -m | awk '/Mem/{printf \"%dM\", $3}')/#(free -m | awk '/Mem/{printf \"%dM\", $2}') \
#[fg=#7b2ff7]│ \
#[fg=#ff2d6f]%H:%M:%S \
#[default]"

# ── 窗口标签 ──
# 非当前窗口: 银灰文字
set -g window-status-format "#[fg=#c0c0c0,dim] #I:#W "
# 当前窗口: 荧光青底 + 深黑字 (高对比)
set -g window-status-current-format "#[fg=#0a0a0f,bg=#00fff0,bold] #I:#W "
# 活动窗口: 霓虹红提示
set -g window-status-activity-style "fg=#ff2d6f,bg=#0a0a0f,bold"
set -g monitor-activity on

# ── 窗格边框 ──
# 非活动边框: 电紫
set -g pane-border-style "fg=#7b2ff7"
# 活动边框: 荧光青
set -g pane-active-border-style "fg=#00fff0"

# ── 消息样式 ──
set -g message-style "bg=#0a0a0f,fg=#ff00ff,bold"
set -g message-command-style "bg=#0a0a0f,fg=#00ff64,bold"

# ── 复制模式 ──
set -g mode-style "bg=#7b2ff7,fg=#c0c0c0,bold"

# ── 时钟 ──
set -g clock-mode-colour "#00fff0"
set -g clock-mode-style 24

# ═══════════════════════════════════════════════════════════════
#  功能配置
# ═══════════════════════════════════════════════════════════════

# ── 前缀键: Ctrl+a (比默认 Ctrl+b 更顺手) ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── 鼠标 ──
set -g mouse on

# ── 滚动缓冲区 ──
set -g history-limit 10000

# ── 窗口/窗格编号从 1 开始 ──
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ── 终端标题 ──
set -g set-titles on
set -g set-titles-string "#H → #S:#W"

# ── 减少延迟 ──
set -g escape-time 0
set -g repeat-time 300

# ── 焦点事件 (用于 vim 等) ──
set -g focus-events on

# ── 窗口自动命名 ──
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# ═══════════════════════════════════════════════════════════════
#  快捷键
# ═══════════════════════════════════════════════════════════════

# ── 窗格分割 (保持当前路径) ──
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── 窗格导航 (Alt + vim 方向键) ──
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── 窗口导航 (Shift + 左/右方向键) ──
bind -n S-Left previous-window
bind -n S-Right next-window

# ── 窗格大小调整 (Alt + Shift + vim 方向键) ──
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# ── 快捷操作 ──
# 重载配置
bind r source-file ~/.tmux.conf \; display "⚡ Cyberdeck tmux reloaded!"

# 矩阵效果 (Ctrl+a → m)
bind m popup -E "cmatrix -s -B -C cyan 2>/dev/null || echo 'Install cmatrix: apt install cmatrix'"

# 系统信息 (Ctrl+a → i)
bind i popup -E "neofetch --colors 6 5 6 5 6 5; read -p 'Press Enter...'"

# 新窗口保持当前路径
bind c new-window -c "#{pane_current_path}"

# ── 复制模式 (vim 风格) ──
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ═══════════════════════════════════════════════════════════════
#  启动会话 (首次启动时自动布局)
# ═══════════════════════════════════════════════════════════════

# 新会话默认名称
set -g default-command "bash"

# 状态栏提示
set -g display-panes-time 2000
set -g display-time 3000
